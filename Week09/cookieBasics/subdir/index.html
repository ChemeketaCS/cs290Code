<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>My cookie test page 2</title>
  </head>
  <body>
    <p>This is a subdirectory. A cookie with your age has been set. It is only available in this subdirectory. In the console after reloading this page you should see the cookie key "age" with value "31".
    </p>
    
    <a href="../index.html">Go back</a>

    <script>
      let oldCookie = document.cookie;
      console.log(oldCookie);
      let cookieCrumbs = oldCookie.split(';');
      for(let crumb of cookieCrumbs) {
        crumb = crumb.trim();
        let eqInd = crumb.search("=");
        let key = crumb.substr(0, eqInd);
        let value = crumb.substr(eqInd + 1);
        console.log(key)
        if(key === "username") {
          document.getElementById("greeting").innerText = "Welcome back " + value;
        }
      }

      // Set a cookie for age that is only available in this subdirectory
      // Path assumes being served by a server using the cs290Code folder as root
      document.cookie = "age=31; Path=/Week09/cookieBasics/subdir/";
    </script>
  </body>
</html>
