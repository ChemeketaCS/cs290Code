<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>fetch sample</title>
    <style></style>
  </head>
  <body>
    <button id="go">Go</button>
    <p>Open the console to see the results...</p>
    <script>
      async function doStuff() {
        const url =
          "https://api.thecatapi.com/v1/images/search?limit=10";
      
        // Sign up for a free API key at https://thecatapi.com/#pricing and replace the value of key with your API key.
        const key = "???";

        // Set up headers to include in the request. The catapi specifies that the API key
        // should be included in the header with the name "x-api-key"
        const options = {
          method: "GET",
          headers: {
            "x-api-key": key,
          },
        };

        try {
          const response = await fetch(url, options);

          console.log(response);

          if (response.status != 200)
            throw response.status + " " + response.statusText;

          //Read the body of the response and wait until that is done.
          const result = await response.json();

          //Show the results
          console.log(result);

          //Response has an array of objects, loop through them
          for (let record of result) {
            console.log(record)
            // check if there is any breed information, if so print it
            if (record.breeds.length > 0) {
              console.log(record.breeds[0]);
              console.log(`Cat breed: ${record.breeds[0].name}`);
              console.log(`Breed description: ${record.breeds[0].description}`);
            }
          }
          console.log("------------------------------");
        } catch (error) {
          console.error(error);
        }
      }

      let fillBtn = document.querySelector("#go");
      fillBtn.addEventListener("click", doStuff);
    </script>
  </body>
</html>
